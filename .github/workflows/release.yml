name: Release

# Tag-triggered npm publish for all 5 @vorionsys/aurais-mcp-* workspaces.
#
# Trigger:  push a tag matching `v*` (e.g. `v0.3.0`). All 5 packages are
#           published with whatever version each declares in its
#           package.json — keep them in lock-step.
#
# Auth: OIDC trusted publishing — no long-lived secret. Confirmed live in
#   v0.3.1 (all 5 packages show `_npmUser.trustedPublisher` on the registry).
#
#   Each package has a trusted publisher configured on npmjs.com:
#     npmjs.com/package/<name>/access -> Trusted Publisher -> GitHub Actions
#       Organization/user: voriongit
#       Repository:        aurais-mcp-bots
#       Workflow filename: release.yml   (filename only, not the full path)
#       Environment:       (none — keep blank; this job sets no environment)
#   It also needs npm CLI >= 11.5.1 (the upgrade step below) and the
#   `id-token: write` permission.
#
# No secrets required. NPM_TOKEN has been retired.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 22 + npm registry
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x,
      # which silently ignores OIDC and falls back to the token. Upgrade so
      # OIDC actually engages.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Build
        run: npm run build --workspaces --if-present

      - name: Test
        run: npm test --workspaces --if-present

      # Authenticates via OIDC trusted publishing (no token). --provenance is
      # automatic under OIDC; kept explicit as a defensive assertion.
      - name: Publish all workspaces to npm
        run: npm publish --workspaces --access=public --provenance
